<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wholesale Portfolio Model Monitoring Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter','Segoe UI',sans-serif}
:root{
  --navy:#0f1d35;--navy-accent:#243860;--blue:#2563eb;--blue-light:#3b82f6;
  --green:#16a34a;--red:#dc2626;--gray-light:#f3f4f6;--border:#e5e7eb;
  --text:#111827;--text-muted:#6b7280;
  --card-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
}
body{display:flex;height:100vh;overflow:hidden;background:#f8fafc}
.sidebar{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid var(--navy-accent)}
.sidebar-logo .logo-icon{font-size:28px;margin-bottom:6px}
.sidebar-logo h1{color:#fff;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;line-height:1.4}
.sidebar-logo p{color:#94a3b8;font-size:10px;margin-top:2px}
.nav-list{list-style:none;padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#94a3b8;font-size:13px;font-weight:500;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:var(--navy-accent);color:#e2e8f0}
.nav-item.active{background:var(--navy-accent);color:#fff;border-left-color:var(--blue-light)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--navy-accent);color:#475569;font-size:10px;line-height:1.6}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{background:#fff;border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.monitoring-controls{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-top:8px}
.monitoring-filter{display:flex;flex-direction:column;gap:4px;position:relative}
.monitoring-filter>label{font-size:11px;color:var(--text-muted);font-weight:600}
.monitoring-filter select,.checkbox-dropdown-toggle{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--text);min-width:118px;height:30px}
.monitoring-filter select:disabled{background:#f8fafc;color:#94a3b8;cursor:not-allowed}
.monitoring-mode-switch{display:flex;height:30px}
.monitoring-mode-switch button{padding:5px 10px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-size:11px;font-weight:600}
.monitoring-mode-switch button:first-child{border-radius:6px 0 0 6px}
.monitoring-mode-switch button:last-child{border-radius:0 6px 6px 0;border-left:none}
.monitoring-mode-switch button.active{background:var(--navy);border-color:var(--navy);color:#fff}
.monitoring-filter-help{flex-basis:100%;font-size:10px;color:var(--text-muted);margin-top:-2px}
.checkbox-dropdown{position:relative}
.checkbox-dropdown-toggle{min-width:190px;max-width:220px;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.checkbox-dropdown-toggle:disabled{background:#f8fafc;color:#94a3b8;cursor:not-allowed}
.checkbox-dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;display:none;min-width:190px;padding:6px 0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:60}
.checkbox-dropdown-menu.open{display:block}
.checkbox-dropdown-menu label{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap}
.checkbox-dropdown-menu label:hover{background:#f8fafc}
.checkbox-dropdown-menu input[type="checkbox"]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.checkbox-dropdown-menu input[type="checkbox"]:disabled{cursor:not-allowed}
.btn{font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500;color:var(--text)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1d4ed8}
.content{flex:1;overflow-y:auto;padding:20px 24px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.dash-header{margin-bottom:16px}
.dash-header h2{font-size:18px;font-weight:700;color:var(--text)}
.dash-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--card-shadow)}
.kpi-card-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.kpi-card-value{font-size:22px;font-weight:800;color:var(--text);line-height:1}
.kpi-card-subtext{font-size:11px;color:var(--text-muted);margin-top:6px}
.monitoring-overview-kpi-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:20px}
.monitoring-overview-kpi{border-top:3px solid #64748b}
.monitoring-overview-kpi-red{border-top-color:var(--red)}
.monitoring-overview-kpi-red .kpi-card-value{color:var(--red)}
.monitoring-overview-kpi-amber{border-top-color:#d97706}
.monitoring-overview-kpi-amber .kpi-card-value{color:#d97706}
.monitoring-overview-kpi-green{border-top-color:var(--green)}
.monitoring-overview-kpi-green .kpi-card-value{color:var(--green)}
.pd-scope-bar{display:flex;gap:18px;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;box-shadow:var(--card-shadow)}
.pd-scope-bar div{display:flex;flex-direction:column;gap:3px;min-width:120px}
.pd-scope-bar span{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.35px}
.pd-scope-bar strong{font-size:12px;color:var(--text);font-weight:700}
.pd-performance-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:14px}
.pd-performance-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:15px;box-shadow:var(--card-shadow)}
.pd-performance-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.pd-performance-value{font-size:28px;font-weight:800;color:var(--text);line-height:1}
.pd-performance-detail{font-size:11px;color:var(--text-muted);margin-top:7px;min-height:28px}
.pd-performance-comparison{display:flex;justify-content:space-between;gap:12px;border-top:1px solid #f1f5f9;margin-top:12px;padding-top:10px}
.pd-performance-comparison div{display:flex;flex-direction:column;gap:4px}
.pd-performance-comparison span{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.35px}
.pd-performance-comparison strong{font-size:12px;color:var(--text)}
.pd-change{font-size:11px!important;font-weight:700!important;letter-spacing:0!important}
.pd-change-positive{color:var(--red)!important}
.pd-change-negative{color:var(--green)!important}
.pd-change-neutral{color:var(--text-muted)!important}
.pd-performance-note{font-size:11px;color:var(--text-muted);background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.pd-migration-section{margin-top:16px}
.pd-section-subtitle{font-size:11px;color:var(--text-muted);margin-top:-5px;margin-bottom:12px}
.pd-migration-summary{display:flex;gap:18px;flex-wrap:wrap;padding:9px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.pd-migration-summary span{font-size:11px;color:var(--text-muted)}
.pd-migration-summary strong{font-size:12px;color:var(--text);margin-right:4px}
.pd-migration-chart{min-height:390px}
.section-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--card-shadow);margin-bottom:16px}
.section-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chart-box{min-height:220px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--gray-light);color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid #f1f5f9;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-critical{background:#fee2e2;color:var(--red)}
.badge-green{background:#dcfce7;color:#15803d}
.page-footer{flex-shrink:0;background:#fff;border-top:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:24px;font-size:11px;color:var(--text-muted)}
.export-menu-wrap{position:relative;display:flex;align-items:stretch}
.export-btn-main{border-radius:6px 0 0 6px!important;border-right:1px solid #1e40af!important}
.export-btn-chevron{padding:6px 10px;border-radius:0 6px 6px 0;background:var(--blue);color:#fff;border:1px solid var(--blue);border-left:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;min-width:28px}
.export-btn-chevron:hover{background:#1d4ed8}
.export-menu{position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);min-width:240px;z-index:50;display:none;overflow:hidden}
.export-menu.open{display:block}
.export-menu-item{padding:10px 14px;font-size:12px;color:var(--text);cursor:pointer;display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid #f1f5f9}
.export-menu-item:last-child{border-bottom:none}
.export-menu-item:hover{background:#f8fafc}
.export-menu-item .icon{font-size:16px;line-height:1.2}
.export-menu-item .label{font-weight:600;font-size:12px;color:var(--text)}
.export-menu-item .sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.export-overlay{position:fixed;inset:0;background:rgba(15,29,53,.7);z-index:9999;display:none;align-items:center;justify-content:center}
.export-overlay.active{display:flex}
.export-overlay-card{background:#fff;border-radius:10px;padding:24px 32px;box-shadow:0 4px 20px rgba(0,0,0,.3);text-align:center;min-width:240px}
.export-overlay-card .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
.export-overlay-card .msg{font-size:13px;font-weight:600;color:var(--text)}
.export-overlay-card .sub{font-size:11px;color:var(--text-muted);margin-top:4px}
body.exporting-pdf button{display:none!important}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){
  .grid-2,.grid-3,.monitoring-overview-kpi-grid,.pd-performance-grid{grid-template-columns:1fr}
}
</style>
</head>

</div>

const DASHBOARD_TYPE = 'monitoring';
let CQ = DASH_DATA.latest_quarter;

// ── MONITORING HELPERS ─────────────────────────────────────────
const fmtN = (v) => v == null ? '—' : (+v).toLocaleString('en-US');

function qLabel(q) {
  return q ? q.slice(0,4)+' Q'+q[5] : '';
}

function monitoringPointLabel() {
  return CQ || '';
}


let activeTab = 'overview';
function switchTab(tabId) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('tab-'+tabId).classList.add('active');
  document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
  activeTab = tabId;
  buildMonitoringModelMenu();
  buildMonitoringSegmentOptions();
  renderTab(tabId);
  syncMonitoringFilterControls();}

function renderTab(tabId) {
  const renders = {
    overview     : renderOverview,
    pd_models    : renderPdModels
  };
  if (renders[tabId]) renders[tabId]();
}


function calculateMonitoringOverviewKpis(overview) {
  const ragScore = {'N/A': 0, Green: 1, Amber: 2, Red: 3};
  const selectedModels = new Set(MONITORING_MODELS);
  const filteredRows = (overview.model_status_rows || []).filter(row => {
    if (row.monitoring_period !== CQ) return false;
    if (MONITORING_FILTER_MODE === 'models') return selectedModels.has(row.model);
    if (MONITORING_METRIC_SEGMENT !== 'all' && row.model_group.toLowerCase() !== MONITORING_METRIC_SEGMENT) return false;
    return MONITORING_PORTFOLIO_SEGMENT === 'all' || row.segment === MONITORING_PORTFOLIO_SEGMENT;
  });

  const statusByModel = new Map();
  filteredRows.forEach(row => {
    const current = statusByModel.get(row.model);
    if (!current || (ragScore[row.overall_rag] || 0) > (ragScore[current.overall_rag] || 0)) {
      statusByModel.set(row.model, row);
    }
  });

  const modelStatuses = Array.from(statusByModel.values());
  const redModels = modelStatuses.filter(row => row.overall_rag === 'Red').length;
  const amberModels = modelStatuses.filter(row => row.overall_rag === 'Amber').length;
  const greenModels = modelStatuses.filter(row => row.overall_rag === 'Green').length;
  return {
    modelsMonitored: modelStatuses.length,
    redModels,
    amberModels,
    greenModels,
    breaches: redModels + amberModels,
  };
}

  const cardsHtml = cards.map(c => `
    <div class="kpi-card monitoring-overview-kpi ${c.css}">
      <div class="kpi-card-title">${c.title}</div>
      <div class="kpi-card-value">${c.value}</div>
      <div class="kpi-card-subtext">${c.detail}</div>
    </div>`).join('');

  document.getElementById('tab-overview').innerHTML = `
    <div class="dash-header">
      <h2>Monitoring Overview — ${monitoringPointLabel()}</h2>
      <p>${overview.overview_text}</p>
    </div>

    <div class="monitoring-overview-kpi-grid">
      ${cardsHtml}
    </div>
  `;
}



function getPreviousPdMonitoringPoint() {
  const points = (DASH_DATA.monitoring_points || []).slice().filter(point => point.quarter);
  points.sort((a,b) => b.date.localeCompare(a.date));
  const index = points.findIndex(point => point.quarter === CQ);
  return index >= 0 && index + 1 < points.length ? points[index + 1] : null;
}

function filterPdPerformanceObservations(observations, quarter) {
  const selectedModels = new Set(MONITORING_MODELS);
  return observations.filter(row => {
    if (row.quarter !== quarter) return false;
    if (!selectedModels.has(row.model)) return false;
    return MONITORING_PORTFOLIO_SEGMENT === 'all' || row.segment === MONITORING_PORTFOLIO_SEGMENT;
  });
}

function calculatePdAuc(rows) {
  const positives = rows.filter(row => row.observed === 1).length;
  const negatives = rows.filter(row => row.observed === 0).length;
  if (!positives || !negatives) return null;

  const sorted = rows.slice().sort((a,b) => a.predicted - b.predicted);
  let positiveRankTotal = 0;
  let index = 0;
  while (index < sorted.length) {
    let end = index + 1;
    while (end < sorted.length && sorted[end].predicted === sorted[index].predicted) end += 1;
    const averageRank = ((index + 1) + end) / 2;
    for (let i = index; i < end; i += 1) {
      if (sorted[i].observed === 1) positiveRankTotal += averageRank;
    }
    index = end;
  }
  return (positiveRankTotal - positives * (positives + 1) / 2) / (positives * negatives);
}

function calculatePdKs(rows) {
  const positives = rows.filter(row => row.observed === 1).length;
  const negatives = rows.filter(row => row.observed === 0).length;
  if (!positives || !negatives) return null;

  const sorted = rows.slice().sort((a,b) => a.predicted - b.predicted);
  let cumulativePositives = 0;
  let cumulativeNegatives = 0;
  let maximumDistance = 0;
  let index = 0;
  while (index < sorted.length) {
    let end = index + 1;
    while (end < sorted.length && sorted[end].predicted === sorted[index].predicted) end += 1;
    for (let i = index; i < end; i += 1) {
      if (sorted[i].observed === 1) cumulativePositives += 1;
      else cumulativeNegatives += 1;
    }
    maximumDistance = Math.max(
      maximumDistance,
      Math.abs(cumulativePositives / positives - cumulativeNegatives / negatives),
    );
    index = end;
  }
  return maximumDistance;
}

function calculatePdPerformanceMetrics(rows) {
  if (!rows.length) {
    return {
      observed_default_rate: null,
      predicted_default_rate: null,
      actual_expected_ratio: null,
      accuracy_ratio: null,
      gini_coefficient: null,
      ks_statistic: null,
    };
  }

  const observedDefaultRate = rows.reduce((sum, row) => sum + row.observed, 0) / rows.length;
  const predictedDefaultRate = rows.reduce((sum, row) => sum + row.predicted, 0) / rows.length;
  const auc = calculatePdAuc(rows);
  const accuracyRatio = auc == null ? null : 2 * auc - 1;
  return {
    observed_default_rate: observedDefaultRate,
    predicted_default_rate: predictedDefaultRate,
    actual_expected_ratio: predictedDefaultRate ? observedDefaultRate / predictedDefaultRate : null,
    accuracy_ratio: accuracyRatio,
    gini_coefficient: accuracyRatio,
    ks_statistic: calculatePdKs(rows),
  };
}

function formatPdMetric(value, format) {
  if (value == null || !Number.isFinite(value)) return '—';
  if (format === 'percent') return `${(value * 100).toFixed(2)}%`;
  return value.toFixed(3);
}

function formatPdPointChange(current, previous) {
  if (current == null || previous == null || !Number.isFinite(current) || !Number.isFinite(previous)) {
    return {text: 'No prior comparison', css: 'pd-change-neutral'};
  }

  const movement = (current - previous) * 100;
  const rounded = Math.abs(movement) < 0.005 ? 0 : movement;
  if (rounded > 0) return {text: `+${rounded.toFixed(2)} pp`, css: 'pd-change-positive'};
  if (rounded < 0) return {text: `${rounded.toFixed(2)} pp`, css: 'pd-change-negative'};
  return {text: '0.00 pp', css: 'pd-change-neutral'};
}

function filterPdRatingObservations(observations, quarter) {
  const selectedModels = new Set(MONITORING_MODELS);
  return observations.filter(row => {
    if (row.quarter !== quarter) return false;
    if (!selectedModels.has(row.model)) return false;
    return MONITORING_PORTFOLIO_SEGMENT === 'all' || row.segment === MONITORING_PORTFOLIO_SEGMENT;
  });
}

function buildPdRatingMigrationMatrix(observations, ratings, currentQuarter, previousQuarter) {
  const matrix = ratings.map(() => ratings.map(() => 0));
  if (!previousQuarter) return {matrix, retained: 0, stable: 0, migrated: 0};

  const currentRows = filterPdRatingObservations(observations, currentQuarter);
  const previousRows = filterPdRatingObservations(observations, previousQuarter);
  const currentByAccount = new Map(currentRows.map(row => [row.account, row.rating]));
  const ratingIndex = new Map(ratings.map((rating, index) => [rating, index]));
  let retained = 0;
  let stable = 0;

  previousRows.forEach(row => {
    const toRating = currentByAccount.get(row.account);
    if (toRating == null) return;
    const fromIndex = ratingIndex.get(row.rating);
    const toIndex = ratingIndex.get(toRating);
    if (fromIndex == null || toIndex == null) return;
    matrix[fromIndex][toIndex] += 1;
    retained += 1;
    if (row.rating === toRating) stable += 1;
  });

  return {matrix, retained, stable, migrated: retained - stable};
}

function drawPdRatingMigrationMatrix(ratings, matrix, previousLabel, hasPreviousPoint) {
  const chart = document.getElementById('pd-rating-migration-chart');
  if (!chart) return;
  if (!hasPreviousPoint) {
    chart.innerHTML = '<div class="pd-performance-note">No previous monitoring point is available for a rating migration comparison.</div>';
    return;
  }
  if (!ratings.length) {
    chart.innerHTML = '<div class="pd-performance-note">No rating migration data is available.</div>';
    return;
  }

  const trace = {
    x: ratings,
    y: ratings,
    z: matrix,
    type: 'heatmap',
    colorscale: [
      [0, '#eff6ff'],
      [0.35, '#bfdbfe'],
      [0.7, '#60a5fa'],
      [1, '#1d4ed8'],
    ],
    colorbar: {title: 'Count'},
    text: matrix.map(row => row.map(value => String(value))),
    texttemplate: '%{text}',
    hovertemplate: 'From rating %{y}<br>To rating %{x}<br>Accounts %{z}<extra></extra>',
  };
  const layout = {
    height: 390,
    margin: {t: 20, r: 80, b: 60, l: 75},
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    xaxis: {title: `Rating To (${CQ})`, type: 'category'},
    yaxis: {title: `Rating From (${previousLabel})`, type: 'category', autorange: 'reversed'},
  };
  Plotly.react('pd-rating-migration-chart', [trace], layout, {responsive: true, displayModeBar: false});
}

function renderPdModels() {
  const pd = (DASH_DATA.monitoring || {}).pd_models || {};
  const observations = pd.performance_observations || [];
  const previousPoint = getPreviousPdMonitoringPoint();
  const currentRows = filterPdPerformanceObservations(observations, CQ);
  const previousRows = previousPoint
    ? filterPdPerformanceObservations(observations, previousPoint.quarter)
    : [];
  const current = calculatePdPerformanceMetrics(currentRows);
  const previous = calculatePdPerformanceMetrics(previousRows);
  const previousLabel = previousPoint ? previousPoint.quarter : 'No prior point';
  const selectedModelCount = MONITORING_MODELS.length;
  const segmentLabel = MONITORING_PORTFOLIO_SEGMENT === 'all' ? 'All segments' : MONITORING_PORTFOLIO_SEGMENT;
  const ratingValues = pd.rating_values || [];
  const ratingMigration = buildPdRatingMigrationMatrix(
    pd.rating_migration_observations || [],
    ratingValues,
    CQ,
    previousPoint ? previousPoint.quarter : null,
  );

  const metrics = [
    {key: 'observed_default_rate', title: 'Observed Default Rate', format: 'percent'},
    {key: 'predicted_default_rate', title: 'Predicted Default Rate', format: 'percent'},
    {key: 'actual_expected_ratio', title: 'Actual / Expected Ratio', format: 'ratio'},
    {key: 'accuracy_ratio', title: 'Accuracy Ratio', format: 'ratio'},
    {key: 'gini_coefficient', title: 'Gini Coefficient', format: 'ratio'},
    {key: 'ks_statistic', title: 'KS Statistic', format: 'ratio'},
  ];

  const cardsHtml = metrics.map(metric => {
    const movement = formatPdPointChange(current[metric.key], previous[metric.key]);
    return `
      <div class="pd-performance-card">
        <div class="pd-performance-title">${metric.title}</div>
        <div class="pd-performance-value">${formatPdMetric(current[metric.key], metric.format)}</div>
        <div class="pd-performance-detail">Current monitoring point: ${CQ}</div>
        <div class="pd-performance-comparison">
          <div>
            <span>Previous (${previousLabel})</span>
            <strong>${formatPdMetric(previous[metric.key], metric.format)}</strong>
          </div>
          <div>
            <span>Change</span>
            <strong class="pd-change ${movement.css}">${movement.text}</strong>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('tab-pd_models').innerHTML = `
    <div class="dash-header">
      <h2>PD Performance Summary — ${monitoringPointLabel()}</h2>
      <p>Compare core probability-of-default monitoring metrics with the immediately previous monitoring point.</p>
    </div>

    <div class="pd-scope-bar">
      <div><span>Monitoring Point</span><strong>${CQ}</strong></div>
      <div><span>Previous Point</span><strong>${previousLabel}</strong></div>
      <div><span>Segment</span><strong>${segmentLabel}</strong></div>
      <div><span>PD Models Selected</span><strong>${fmtN(selectedModelCount)}</strong></div>
      <div><span>Current Records</span><strong>${fmtN(currentRows.length)}</strong></div>
    </div>

    <div class="pd-performance-grid">
      ${cardsHtml}
    </div>

    <div class="pd-performance-note">
      Change is shown in percentage points as current monitoring point minus previous monitoring point.
      Positive movement is red, negative movement is green, and no movement is gray.
    </div>

    <div class="section-card pd-migration-section">
      <div class="section-title">Rating Migration Matrix</div>
      <div class="pd-section-subtitle">
        Counts of retained accounts moving from ${previousLabel} ratings (rows) to ${CQ} ratings (columns).
      </div>
      <div class="pd-migration-summary">
        <span><strong>${fmtN(ratingMigration.retained)}</strong> Retained accounts</span>
        <span><strong>${fmtN(ratingMigration.stable)}</strong> Stable ratings</span>
        <span><strong>${fmtN(ratingMigration.migrated)}</strong> Migrated ratings</span>
      </div>
      <div id="pd-rating-migration-chart" class="pd-migration-chart"></div>
    </div>
  `;

  drawPdRatingMigrationMatrix(
    ratingValues,
    ratingMigration.matrix,
    previousLabel,
    Boolean(previousPoint),
  );
}



// ── Monitoring selectors ────────────────────────────────────────
let MONITORING_METRIC_SEGMENT = 'all';
let MONITORING_PORTFOLIO_SEGMENT = 'all';
let MONITORING_MODELS = [];
let MONITORING_FILTER_MODE = 'group';
let MONITORING_POINT = DASH_DATA.latest_monitoring_point || '';

function getMonitoringFilterPayload() {
  const monitoring = DASH_DATA.monitoring || {};
  return activeTab === 'overview' ? (monitoring.overview || {}) : (monitoring.pd_models || {});
}
function getMonitoringModelNames() {
  return getMonitoringFilterPayload().model_names || [];
}
function getMonitoringSegmentValues() {
  return getMonitoringFilterPayload().segment_values || [];
}
function initSelectors() {
  const sel = document.getElementById('monitoring-quarter-select');
  if (sel) {
    const points = (DASH_DATA.monitoring_points || []).slice().filter(point => point.date && point.quarter);
    points.sort((a,b) => b.date.localeCompare(a.date));
    points.forEach(point => {
      const opt = document.createElement('option');
      opt.value = point.date;
      opt.text = point.quarter;
      if (point.date === MONITORING_POINT) opt.selected = true;
      sel.appendChild(opt);
    });
  }
  buildMonitoringModelMenu();
  buildMonitoringSegmentOptions();
  syncMonitoringFilterControls();
}
function buildMonitoringSegmentOptions() {
  const sel = document.getElementById('monitoring-portfolio-segment-select');
  if (!sel) return;

  const segmentValues = getMonitoringSegmentValues();
  sel.innerHTML = '';

  const allOption = document.createElement('option');
  allOption.value = 'all';
  allOption.text = 'All';
  allOption.selected = MONITORING_PORTFOLIO_SEGMENT === 'all';
  sel.appendChild(allOption);

  segmentValues.forEach(value => {
    const opt = document.createElement('option');
    opt.value = value;
    opt.text = value;
    opt.selected = value === MONITORING_PORTFOLIO_SEGMENT;
    sel.appendChild(opt);
  });
  if (!segmentValues.includes(MONITORING_PORTFOLIO_SEGMENT)) {
    MONITORING_PORTFOLIO_SEGMENT = 'all';
    sel.value = 'all';
  }
}
function buildMonitoringModelMenu() {
  const menu = document.getElementById('monitoring-model-menu');
  if (!menu) return;

  const modelNames = getMonitoringModelNames();
  const nodes = [];
  nodes.push(
    `<label><input type="checkbox" value="All" data-model-all onchange="setMonitoringModels(this)" checked>All</label>`
  );
  modelNames.forEach(name => {
    nodes.push(
      `<label><input type="checkbox" value="${name}" onchange="setMonitoringModels(this)" checked>${name}</label>`
    );
  });
  menu.innerHTML = nodes.join('');
  MONITORING_MODELS = modelNames.slice();
}
function setCurrentMonitoringPoint(date) {
  const point = (DASH_DATA.monitoring_points || []).find(item => item.date === date);
  if (!point) return;
  MONITORING_POINT = point.date;
  CQ = point.quarter;
  renderAll();
}
function setMonitoringFilterMode(mode) {
  if (mode !== 'group' && mode !== 'models') return;
  MONITORING_FILTER_MODE = mode;
  syncMonitoringFilterControls();
  renderAll();
}
function setMonitoringSegment(which, value) {
  if (which === 'metric') MONITORING_METRIC_SEGMENT = value;
  if (which === 'portfolio') MONITORING_PORTFOLIO_SEGMENT = value;
  syncMonitoringFilterControls();
  renderAll();
}
function setMonitoringModels(changedInput) {
  const inputs = Array.from(document.querySelectorAll('#monitoring-model-menu input[type="checkbox"]'));
  const allInput = inputs.find(input => input.hasAttribute('data-model-all'));
  const modelInputs = inputs.filter(input => !input.hasAttribute('data-model-all'));
  if (changedInput && changedInput.hasAttribute('data-model-all')) {
    modelInputs.forEach(input => { input.checked = changedInput.checked; });
  } else if (allInput) {
    allInput.checked = modelInputs.length > 0 && modelInputs.every(input => input.checked);
  }
  MONITORING_MODELS = modelInputs.filter(input => input.checked).map(input => input.value);
  syncMonitoringFilterControls();
  renderAll();
}
function syncMonitoringFilterControls() {
  const isPdPerformanceTab = activeTab === 'pd_models';
  const groupMode = !isPdPerformanceTab && MONITORING_FILTER_MODE === 'group';
  const modelMode = isPdPerformanceTab || MONITORING_FILTER_MODE === 'models';
  const metricSelect = document.getElementById('monitoring-metric-segment-select');
  const portfolioSelect = document.getElementById('monitoring-portfolio-segment-select');
  const modeFilter = document.querySelector('.monitoring-mode-filter');
  const modelGroupFilter = document.querySelector('.monitoring-model-group-filter');
  const toggle = document.getElementById('monitoring-model-toggle');
  const menu = document.getElementById('monitoring-model-menu');
  const inputs = document.querySelectorAll('#monitoring-model-menu input[type="checkbox"]');
  const groupButton = document.getElementById('monitoring-mode-group');
  const modelsButton = document.getElementById('monitoring-mode-models');
  const help = document.getElementById('monitoring-filter-help');
  const modelNames = getMonitoringModelNames();
  const hasSpecificModelSelection = (
    MONITORING_MODELS.length > 0
    && MONITORING_MODELS.length < modelNames.length
  );
  const hasSegmentSelection = MONITORING_PORTFOLIO_SEGMENT !== 'all';

  if (groupMode) {
    MONITORING_MODELS = [];
    inputs.forEach(input => { input.checked = false; });
    if (menu) menu.classList.remove('open');
  }

  if (modeFilter) {
    modeFilter.style.display = isPdPerformanceTab ? 'none' : 'flex';
  }
  if (modelGroupFilter) {
    modelGroupFilter.style.display = isPdPerformanceTab ? 'none' : 'flex';
  }

  if (metricSelect) metricSelect.disabled = isPdPerformanceTab || !groupMode;
  if (portfolioSelect) {
    portfolioSelect.disabled = isPdPerformanceTab
      ? hasSpecificModelSelection
      : !groupMode;
  }
  inputs.forEach(input => {
    input.disabled = isPdPerformanceTab
      ? hasSegmentSelection
      : !modelMode;
  });

  if (toggle) {
    toggle.disabled = isPdPerformanceTab ? hasSegmentSelection : !modelMode;
    const totalModelCount = Math.max(0, inputs.length - 1);
    if (isPdPerformanceTab && hasSegmentSelection) toggle.textContent = 'Disabled while Segment is selected';
    else if (!modelMode) toggle.textContent = 'Switch mode to select models';
    else if (!MONITORING_MODELS.length) toggle.textContent = 'Select models';
    else if (MONITORING_MODELS.length === totalModelCount) toggle.textContent = 'All models';
    else if (MONITORING_MODELS.length === 1) toggle.textContent = MONITORING_MODELS[0];
    else toggle.textContent = `${MONITORING_MODELS.length} models selected`;
  }

  if (groupButton) groupButton.classList.toggle('active', groupMode);
  if (modelsButton) modelsButton.classList.toggle('active', modelMode);
  if (help) {
    if (isPdPerformanceTab) {
      if (hasSegmentSelection) {
        help.textContent = 'Segment filtering is active. Reset Segment to All to select specific PD models.';
      } else if (hasSpecificModelSelection) {
        help.textContent = 'Specific Models filtering is active. Reset models to All to select a portfolio segment.';
      } else {
        help.textContent = 'Choose a portfolio segment or specific PD models. These filters cannot be combined.';
      }
    } else {
      help.textContent = groupMode
        ? 'Choose a model group and segment. Switch to Specific Models to select individual models.'
        : 'Results include any selected model. Model Group and Segment are disabled in this mode.';
    }
  }
}
function toggleMonitoringModelMenu(e) {
  if (e) e.stopPropagation();
  const toggle = document.getElementById('monitoring-model-toggle');
  const menu = document.getElementById('monitoring-model-menu');
  if (toggle && !toggle.disabled && menu) menu.classList.toggle('open');
}
function renderAll() { renderTab(activeTab); }

function initFooter() {
  document.getElementById('footer-data-as-of').textContent = 'Data as of: '+DASH_DATA.data_as_of;
  document.getElementById('footer-source').textContent = 'Source: '+DASH_DATA.source;
  document.getElementById('footer-run-id').textContent = 'Run ID: '+DASH_DATA.run_id;
  document.getElementById('footer-refresh').textContent = 'Last refresh: '+DASH_DATA.last_refresh;
  document.getElementById('sidebar-footer').innerHTML =
    `Data as of:<br>${DASH_DATA.data_as_of}<br><br>Last refresh:<br>${DASH_DATA.last_refresh}`;
}

(function init() {
  initSelectors();
  initFooter();
  document.querySelector('[data-tab="overview"]').classList.add('active');
  renderOverview();
})();


</script>
