data:
  source: excel            # excel | sql — the only switch between test data and SQL Server
  # excel mode (test/dev data, relative to this config's folder)
  portfolio_2024_file: wholesale_portfolio_dummy_db_2024.xlsx
  portfolio_file: wholesale_portfolio_dummy_db_2025.xlsx
  schema_file: wholesale_portfolio_schema.xlsx     # stays a file in BOTH modes
  sheet_name: JumpoffALLL
  date_column: "MONTH END-SNAPSHOT DATE"
  facility_id_column: FCL-ID
  instrument_id_column: ACCT-SYS-CR-INSMID
  null_sentinels: ["NULL", "ZZZ", "N/A", ""]
  # sql mode (used only when source: sql — filled in on the Windows machine,
  # queries run through STATpy's data_manager gateway)
  sql:
    database: STAT_UAT_Input          # placeholder — confirm on Windows
    portfolio_query: "SELECT * FROM ..."
    portfolio_2024_query: "SELECT * FROM ..."
    column_map: {}                    # optional SQL-name -> schema-name renames

render:
  asset_mode: local        # cdn | local — local copies vendored plotly/html2pdf into each run dir

output:
  directory: output
  versioned: true
  html_filename: dq_dashboard.html
  excel_filename: dq_report.xlsx
  # keep_last_n: 20        # uncomment to prune oldest versioned run dirs after each successful build

business_rules:
  - code: BR_001
    description: Balance must be >= 0
    column: Balance
    type: range_min
    threshold: 0
    severity: High
    domain: Exposure

  - code: BR_002
    description: DSCR must be between 0 and 5
    column: DSCR
    type: range
    min: 0
    max: 5
    severity: Medium
    domain: Credit Risk Metrics

  - code: BR_003
    description: LGD must be between 0 and 1
    column: LOSS-GVN-DFLT-FAC
    type: range
    min: 0
    max: 1
    severity: Critical
    domain: Credit Risk Metrics

  - code: BR_004
    description: Drawn EAD must be >= 0
    column: BASEL-DRAWN-EAD
    type: range_min
    threshold: 0
    severity: High
    domain: Exposure

  - code: BR_005
    description: Rating must be in valid rating list
    column: FNL-CUST-RISK-GR
    type: categorical
    valid_values: [1.1, 1.2, 2.1, 2.2, 3.1, 3.2, 4.1, 4.2, 5.1, 5.2, 6.1, 6.2, 7.1, 7.2, 8.1, 9.0]
    severity: High
    domain: Credit Risk Metrics

  - code: BR_006
    description: Basel II Category must be valid
    column: BASELII-CATEGORY
    type: categorical
    valid_values: [Corporate, CRE, L&C, Banks]
    severity: Critical
    domain: Reference Data

  - code: BR_007
    description: Business Unit must not be null
    column: BUSINESS UNIT
    type: not_null
    severity: Critical
    domain: Reference Data

  - code: BR_008
    description: LTV must be between 0 and 2
    column: LTV
    type: range
    min: 0
    max: 2
    severity: Medium
    domain: Collateral

  - code: BR_009
    description: Effective Maturity must be between 0 and 50 years
    column: M-EFF-MAT
    type: range
    min: 0
    max: 50
    severity: Medium
    domain: Exposure

  - code: BR_010
    description: CDW Validation Engine Pct must be between 0 and 1
    column: CDW-VALI-ENG-PCT
    type: range
    min: 0
    max: 1
    severity: Low
    domain: Reference Data

  - code: BR_011
    description: ALLL must be >= 0 (negative ALLL indicates sign-convention error)
    column: ALLL
    type: range_min
    threshold: 0
    severity: Critical
    domain: Reserve & ALLL

  - code: CF_001
    description: "HVCRE-FLAG=Y must have BASELII-CATEGORY=CRE (150% risk weight alignment)"
    column: HVCRE-FLAG
    column_b: BASELII-CATEGORY
    type: cross_field_implies
    condition_value: "Y"
    required_value: "CRE"
    severity: Critical
    domain: Regulatory Compliance

  - code: CF_002
    description: "CDW-RWA-CALC-FLAG=Y must have CDW-CAPITAL-CHARGE > 0"
    column: CDW-RWA-CALC-FLAG
    column_b: CDW-CAPITAL-CHARGE
    type: cross_field_implies_positive
    condition_value: "Y"
    severity: Critical
    domain: Capital & RWA

  - code: CF_003
    description: "SME-IND=Y should be in SME Business Unit (cross-BU monitoring)"
    column: SME-IND
    column_b: BUSINESS UNIT
    type: cross_field_implies
    condition_value: "Y"
    required_value: "SME"
    severity: High
    domain: Regulatory Compliance

  - code: CF_004
    description: "MODEL LGD and applied LGD gap must be <= 30pp (unexplained ECL gap)"
    column: MODEL LGD
    column_b: LOSS-GVN-DFLT-FAC
    type: cross_field_gap
    max_gap: 0.30
    severity: Critical
    domain: Credit Risk Metrics

drift:
  numeric_columns:
    - Balance
    - DSCR
    - LOSS-GVN-DFLT-FAC
    - BASEL-DRAWN-EAD
    - BASEL-UNDRAWN-EAD
    - M-EFF-MAT
    - LTV
    - CDW-VALI-ENG-PCT
    - TOTAL ASSET
  bins: 5
  thresholds:
    minor: 0.10
    moderate: 0.20
    high: 0.50

completeness:
  critical_columns:
    - FCL-ID
    - ACCT-SYS-CR-INSMID
    - Balance
    - "MONTH END-SNAPSHOT DATE"
    - BUSINESS UNIT
    - BASELII-CATEGORY
    - FNL-CUST-RISK-GR
    - BASEL-DRAWN-EAD
    - DSCR
    - CUST-NME
  thresholds:
    critical: 25.0
    high: 10.0
    medium: 5.0
    low: 1.0

population:
  id_column: ACCT-SYS-CR-INSMID
  segment_column: BUSINESS UNIT
